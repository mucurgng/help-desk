<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Контакты поддержки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link active" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link" th:href="@{/faq}">FAQ</a>
        </div>
    </div>
</nav>
<main class="container py-5">
    <h1 class="fw-bold mb-4" th:text="${pageTitle}">
        Контакты поддержки
    </h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped align-middle mb-0">
                <tbody>
                <tr>
                    <th scope="row">Email</th>
                    <td th:text="${supportEmail}">support@example.com</td>
                </tr>
                <tr>
                    <th scope="row">Телефон</th>
                    <td th:text="${phone}">+7 (000) 000-00-00</td>
                </tr>
                <tr>
                    <th scope="row">Время работы</th>
                    <td th:text="${workTime}">Пн-Пт, 09:00-18:00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <section class="mt-4">
        <h2 class="h4">Что указать в обращении</h2>
        <ul class="list-group shadow-sm">
            <li class="list-group-item" th:each="item : ${requestChecklist}" th:text="${item}">
                Кратко опишите проблему
            </li>
        </ul>
    </section>

    <div class="alert alert-info mt-4">
        В следующих модулях здесь появится форма создания обращения.
    </div>
    <a class="btn btn-outline-primary" th:href="@{/}">
        Вернуться на главную
    </a>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
