<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заявка принята | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/tickets}">Заявки</a>
            <a class="nav-link" th:href="@{/tickets/new}">Создать заявку</a>
        </div>
    </div>
</nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="alert alert-success shadow-sm">
                <h1 class="alert-heading">Спасибо, ваша заявка принята!</h1>
                <p class="mb-2">
                    Номер вашей заявки:
                    <strong th:text="${ticket.id}">1</strong>
                </p>
                <p class="mb-2">
                    Тема:
                    <span th:text="${ticket.title}">Не работает принтер</span>
                </p>
                <p class="mb-0">
                    Статус:
                    <span class="badge bg-primary" th:text="${ticket.status}">NEW</span>
                </p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/tickets}" class="btn btn-primary">Посмотреть все заявки</a>
                <a th:href="@{/tickets/new}" class="btn btn-outline-primary">
                    Создать ещё одну
                </a>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
