<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">FAQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link active" th:href="@{/faq}">FAQ</a>
        </div>
    </div>
</nav>
<main class="container py-5">
    <h1 class="fw-bold mb-4" th:text="${pageTitle}">FAQ</h1>

    <section class="row g-4">
        <div class="col-lg-4" th:each="item : ${questions}">
            <article class="card h-100 shadow-sm">
                <div class="card-body">
                    <h2 class="h5" th:text="${item.question()}">Вопрос</h2>
                    <p class="card-text text-muted" th:text="${item.answer()}">
                        Ответ
                    </p>
                </div>
            </article>
        </div>
    </section>

    <a class="btn btn-outline-primary mt-4" th:href="@{/contacts}">
        Перейти к контактам
    </a>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
