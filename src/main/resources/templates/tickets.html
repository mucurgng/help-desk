<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заявки | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link active" th:href="@{/tickets}">Заявки</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link" th:href="@{/faq}">FAQ</a>
        </div>
    </div>
</nav>
<main class="container py-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="mb-1" th:text="${filterTitle}">Все заявки</h1>
            <p class="text-muted mb-0">Данные загружаются из H2 Database.</p>
        </div>
        <span class="badge text-bg-secondary" th:text="${#lists.size(tickets)} + ' заявок'">6 заявок</span>
    </div>

    <div class="d-flex flex-wrap gap-2 mb-4">
        <a class="btn btn-primary" th:href="@{/tickets}">Все заявки</a>
        <a class="btn btn-outline-primary" th:href="@{/tickets/customer}">Клиент Иван</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Тема</th>
                        <th>Пользователь</th>
                        <th>Статус</th>
                        <th>Дата создания</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td th:text="${ticket.id}">1</td>
                        <td>
                            <strong th:text="${ticket.title}">Тема</strong>
                            <div class="small text-muted" th:text="${ticket.description}">Описание</div>
                        </td>
                        <td th:text="${ticket.customerName}">Иван Иванов</td>
                        <td>
                            <span class="badge text-bg-secondary" th:text="${ticket.status}">NEW</span>
                        </td>
                        <td th:text="${#temporals.format(ticket.createdAt, 'dd.MM.yyyy HH:mm')}">
                            14.05.2026 09:00
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
